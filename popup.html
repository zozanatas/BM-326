<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Akıllı Yanıt Asistanı</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            width: 320px; 
            padding: 15px; 
            margin: 0; 
            background-color: #f8f9fa; 
        }
        h3 { 
            margin-top: 0; 
            color: #333; 
            font-size: 16px; 
            border-bottom: 2px solid #5865F2; 
            padding-bottom: 8px; 
        }
        .btn { 
            width: 100%; 
            padding: 10px; 
            background-color: #5865F2; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #4752C4; }
        .btn-success { background-color: #28a745; margin-top: 10px; }
        .btn-success:hover { background-color: #218838; }
        
        #result-container { 
            margin-top: 15px; 
            display: none; 
        }
        .tag-container { margin-bottom: 10px; }
        .tag { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: bold; 
            color: white; 
            margin-right: 5px; 
            margin-bottom: 5px;
        }
        textarea { 
            width: 100%; 
            height: 120px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            padding: 8px; 
            box-sizing: border-box; 
            resize: vertical; 
            font-family: inherit;
            font-size: 13px;
        }
        .status-text { font-size: 12px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>
    <h3>Akıllı Yanıt Asistanı</h3>
    
    <button id="analyze-btn" class="btn">Bu E-postayı Analiz Et</button>
    <div id="status" class="status-text"></div>

    <div id="result-container">
        <div id="tags" class="tag-container">
            </div>
        <textarea id="reply-text"></textarea>
        <button id="insert-btn" class="btn btn-success">E-postaya Ekle</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
